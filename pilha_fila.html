      let dados = [];

        dados.push('A');
        dados.push('B');
        dados.push('C');
        dados.push('D');
        dados.push('E');

      for (i = 0; i < dados.length; i++) {
        alert("Elemento " + (i+1) + "; " + dados [i]);
        console.log("Elemento " + (i+1) + "; " + dados [i]);
      }
    
      let removido = dados.pop();
        alert("Elemento " + removido + " removido")
        console.log("Elemento " + removido + " removido")

        alert("Elemento " + removido + " removido")
        console.log("Elemento " + removido + " removido")

     </script>
