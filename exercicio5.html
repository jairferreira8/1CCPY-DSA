    <script>

        let dados = [2, 5, 2, 7, 2, 9];
        let alvo = 2;
        let contador = 0;

        for (i = 0; i < dados.length; i++) {
            if (dados [i] === alvo){
                contador++;
            }
        }
        if (contador == 1)
        console.log (alvo + ' encontado 1 vez');
        else
        console.log ('Valor ' + alvo + ' encontrado ' + contador + ' vezes');

    </script>
<body>

</body>
