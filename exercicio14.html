<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

    <script>

        let expressao = '(a+b) * (c-d)';
        let pilha = [];
        let ok = true;
        for (let i = 0; i < expressao.length; i++) {
        if (expressao[i] === '(') {
        pilha.push('(');
        }
        if (expressao[i] === ')') {
        if (pilha.length === 0) {
        ok = false;
        break;
        }
        pilha.pop();
        }
        }
        if (pilha.length > 0) {
        ok = false;
        }
        console.log('Balanceado?', ok);


    </script>
<body>
        <h1>Jair</h1>
</body>
</html>
