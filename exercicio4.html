<html lang="pt-br">
<head>
    <meta charset="UTF-8">

</head>

    <script>

        let dados = [10, 20, 30, 40, 50]
        let procurado = 30;
        let posicao = -1;

        for (i = 0; i < dados.length; i++) {
            if (dados[i] === procurado) {
                posicao = i;
                break;
            }
        }
        if (posicao == -1)
        console.log('Posição não encontrada no vetor')
        else
        console.log('Posição = ', posicao)

    </script>
<body>
        <h1>Jair</h1>
</body>
